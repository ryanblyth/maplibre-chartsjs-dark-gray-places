<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Custom Map Fixed Basemap Preview</title>
  <script type="importmap">
  {
    "imports": {
      "chart.js": "https://esm.sh/chart.js@4.4.0",
      "fuse.js": "https://esm.sh/fuse.js@7.0.0"
    }
  }
  </script>
  <link href="https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="starfield-container"></div>
  <div id="globe-glow"></div>
  <div id="map-container"></div>

  <aside id="charts-dock" aria-label="Charts and place details">
    <button
      type="button"
      id="charts-dock-drawer-tab"
      class="charts-dock-drawer-tab"
      aria-controls="charts-dock-slide"
      aria-expanded="true"
    >
      Hide charts
    </button>
    <div
      id="charts-dock-slide"
      class="charts-dock-slide"
    >
      <div
        id="charts-dock-resize-handle"
        class="charts-dock-resize-handle"
        role="separator"
        aria-orientation="vertical"
        aria-label="Resize charts panel"
        tabindex="0"
      ></div>
      <div class="charts-dock-inner">
      
      <div class="charts-dock-content-first">
      
        <div class="charts-dock-header-row">
        <h1 class="charts-dock-title">Place charts</h1>
        <div class="charts-dock-header-controls">
          <button type="button" id="charts-dock-values-toggle" class="charts-dock-control-btn" aria-pressed="true">Hide values</button>
          <button type="button" id="charts-dock-theme-toggle" class="charts-dock-control-btn" aria-pressed="false">Light panel</button>
        </div>
        </div>
        <p id="charts-dock-vintage" class="charts-dock-vintage" hidden></p>
        <div class="charts-dock-search">
          <input
            id="charts-dock-search-input"
            type="search"
            placeholder="Search places…"
            disabled
            autocomplete="off"
            aria-autocomplete="list"
            aria-controls="charts-dock-search-results"
            aria-expanded="false"
          />
          <div id="charts-dock-search-results" class="charts-dock-search-results" role="listbox" hidden></div>
          <p id="charts-dock-search-error" class="charts-dock-search-error" hidden></p>
        </div>
        <p class="charts-dock-placeholder">Select a place on the map.</p>
        <div id="charts-dock-selection" class="charts-dock-selection" hidden aria-live="polite">
          <h2 id="charts-dock-place-name" class="charts-dock-place-name"></h2>
          <p id="charts-dock-geoid" class="charts-dock-geoid"></p>
          <dl id="charts-dock-summary" class="charts-dock-summary"></dl>
        </div>
      </div>


      <div id="charts-panel-root">
        <section id="charts-dock-charts-area" class="charts-dock-charts-area" hidden>
          <p id="charts-dock-charts-msg" class="charts-dock-charts-msg" hidden></p>
          <div id="charts-dock-demographics-block" class="charts-dock-demographics-block" hidden>
            <h3 class="charts-dock-chart-heading">Demographics by percent</h3>
            <div class="charts-dock-chart-canvas-wrap">
              <canvas id="dock-demographics-percent-chart" aria-label="Demographics by percent chart"></canvas>
            </div>
          </div>
          <div id="charts-dock-commute-block" class="charts-dock-commute-block" hidden>
            <h3 class="charts-dock-chart-heading">Commute by percent</h3>
            <div class="charts-dock-chart-canvas-wrap">
              <canvas id="dock-commute-percent-chart" aria-label="Commute by percent chart"></canvas>
            </div>
          </div>
          <div id="charts-dock-doughnuts-row" class="charts-dock-doughnuts-row" hidden>
            <div class="charts-dock-doughnut-block">
              <h3 class="charts-dock-chart-heading">Demographics share</h3>
              <div class="charts-dock-doughnut-inner">
                <div class="charts-dock-doughnut-canvas-wrap">
                  <canvas id="dock-demographic-doughnut-chart" aria-label="Demographics doughnut chart"></canvas>
                </div>
                <div id="dock-demographic-doughnut-legend" class="chart-legend charts-dock-chart-legend"></div>
              </div>
            </div>
            <div class="charts-dock-doughnut-block">
              <h3 class="charts-dock-chart-heading">Commute share</h3>
              <div class="charts-dock-doughnut-inner">
                <div class="charts-dock-doughnut-canvas-wrap">
                  <canvas id="dock-commute-doughnut-chart" aria-label="Commute doughnut chart"></canvas>
                </div>
                <div id="dock-commute-doughnut-legend" class="chart-legend charts-dock-chart-legend"></div>
              </div>
            </div>
          </div>
          <div id="charts-dock-top-cities-block" class="charts-dock-top-cities-block" hidden>
            <h3 class="charts-dock-chart-heading">State population ranking</h3>
            <div class="charts-dock-chart-canvas-wrap">
              <canvas id="dock-state-top-cities-chart" aria-label="Top cities by population chart"></canvas>
            </div>
          </div>
        </section>
      </div>
    </div>
    </div>
  </aside>

  <div
    id="charts-dock-scrim"
    class="charts-dock-scrim"
    hidden
    aria-hidden="true"
  ></div>
  <script>
    (function () {
      try {
        const KEY = "charts-dock-drawer-open"; // must match STORAGE_KEYS.DRAWER_OPEN in dock-constants.js
        const raw = localStorage.getItem(KEY);
        const narrow = window.matchMedia("(max-width: 768px)").matches;
        const open = raw === null ? !narrow : raw === "true";
        const dock = document.getElementById("charts-dock");
        const slide = document.getElementById("charts-dock-slide");
        const tab = document.getElementById("charts-dock-drawer-tab");
        if (dock && !open) {
          dock.classList.add("charts-dock--closed");
        }
        if (slide) {
          slide.setAttribute("aria-hidden", open ? "false" : "true");
        }
        if (tab) {
          tab.textContent = open ? "Hide charts" : "Show charts";
          tab.setAttribute("aria-expanded", open ? "true" : "false");
        }
      } catch (e) {
        /* ignore */
      }
    })();
  </script>

  <script src="https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@4.3.0/dist/pmtiles.js"></script>
  <script src="https://data.storypath.studio/js/maplibre-gl-starfield.js"></script>
  <script src="./map-config.js"></script>
  <script type="module" src="./charts-dock-resize.js"></script>
  <script type="module" src="./map.js"></script>
  <script type="module" src="./charts-dock-drawer.js"></script>
  <script type="module" src="./charts-dock-panel.js"></script>
  <script type="module" src="./charts-dock-search.js"></script>
</body>
</html>
